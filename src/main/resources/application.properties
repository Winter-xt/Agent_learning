spring.application.name=ai_project
spring.datasource.url=jdbc:mysql://localhost:3306/ai_project?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Redis (local deployment)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Vector index with metadata filter fields (v2 avoids old incompatible schema)
app.vector.index-name=talent-index-v2
app.vector.prefix=talent:v2:

# MyBatis-Plus Config
mybatis-plus.type-aliases-package=com.ai.project.ai_project.domain
mybatis-plus.global-config.db-config.id-type=auto

# AI API Keys (from environment variables)
GEMINI_AI_KEY=${GEMINI_AI_KEY}
OPENAI_API_KEY=${OPENAI_API_KEY}
DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
